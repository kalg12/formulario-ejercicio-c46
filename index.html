<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario - Ejercicio</title>
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body>
    <h1>Registrate a nuestro Bootcamp - UCAMP</h1>

    <form id="registrationForm">
      <label for="firstName">Nombre:</label>
      <input type="text" id="firstName" name="firstName" required />

      <label for="lastName">Apellidos:</label>
      <input type="text" id="lastName" name="lastName" required />

      <label for="academicProfile">Perfil Académico:</label>
      <input type="text" id="academicProfile" name="academicProfile" required />

      <label for="age">Edad:</label>
      <input type="number" id="age" name="age" required />

      <label for="gender">Sexo:</label>
      <select id="gender" name="gender" required>
        <option value="">Selecciona tu sexo</option>
        <option value="male">Masculino</option>
        <option value="female">Femenino</option>
        <option value="other">Otro</option>
      </select>

      <label for="email">Correo Electrónico:</label>
      <input type="email" id="email" name="email" required />

      <label for="phone">Número de Teléfono:</label>
      <input type="tel" id="phone" name="phone" required />

      <label for="message">Mensaje:</label>
      <textarea id="message" name="message" required></textarea>

      <label for="bootcamp">Selecciona un Bootcamp:</label>
      <select id="bootcamp" name="bootcamp" required>
        <option value="">Selecciona un bootcamp</option>
        <option value="webDevelopment">Programación Web</option>
        <option value="dataScience">Ciencia de Datos</option>
        <option value="cyberSecurity">Ciberseguridad</option>
      </select>

      <button type="submit">Enviar</button>
      <button type="reset">Limpiar Formulario</button>
    </form>

    <!-- Script -->
    <script src="./js/main.js"></script>
  </body>
</html>
